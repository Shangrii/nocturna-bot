<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sketch 001 — Nocturna Admin Dashboard</title>
<link rel="stylesheet" href="../themes/default.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-sans);
    font-size: var(--text-base);
    padding-top: 46px; /* variant nav */
  }
  button { font-family: inherit; cursor: pointer; }

  /* ── Variant nav ─────────────────────────────── */
  #variant-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9998;
    background: #0a0c10; border-bottom: 1px solid var(--color-border);
    padding: 8px 16px; display: flex; gap: 8px; align-items: center;
  }
  #variant-nav .tag { font-size: var(--text-xs); color: var(--color-text-faint); margin-right: 8px; }
  .variant-tab {
    background: var(--color-surface-2); color: var(--color-text-muted);
    border: 1px solid var(--color-border); border-radius: var(--radius-sm);
    padding: 6px 14px; font-size: var(--text-sm); transition: all .15s ease;
  }
  .variant-tab:hover { color: var(--color-text); border-color: var(--color-border-strong); }
  .variant-tab.active { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }

  .variant { display: none; }
  .variant.active { display: block; }

  /* ── Shell ───────────────────────────────────── */
  .shell { display: flex; min-height: calc(100vh - 46px); max-width: var(--vp, 100%); margin: 0 auto; }
  .side {
    background: var(--color-surface); border-right: 1px solid var(--color-border);
    flex-shrink: 0; display: flex; flex-direction: column; padding: var(--space-4) 0;
  }
  .v-comfy .side { width: 250px; }
  .v-dense .side { width: 205px; padding: var(--space-2) 0; }
  .brand {
    display: flex; align-items: center; gap: 10px; padding: var(--space-2) var(--space-4) var(--space-4);
    border-bottom: 1px solid var(--color-border); margin-bottom: var(--space-3);
  }
  .brand .logo {
    width: 34px; height: 34px; border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--color-brand), #7a0f18);
    display: grid; place-items: center; font-weight: 800; color: #fff; font-size: 15px;
  }
  .brand .t { font-weight: 700; font-size: var(--text-base); letter-spacing: .02em; }
  .brand .s { font-size: var(--text-xs); color: var(--color-text-faint); }
  .v-dense .brand { padding-bottom: var(--space-2); }
  .v-dense .brand .logo { width: 26px; height: 26px; font-size: 12px; border-radius: var(--radius-sm); }

  .side .grp { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: .1em;
    color: var(--color-text-faint); padding: var(--space-3) var(--space-4) var(--space-1); }
  .nav-item {
    display: flex; align-items: center; gap: 10px; width: 100%;
    background: none; border: none; text-align: left; color: var(--color-text-muted);
    padding: 9px var(--space-4); font-size: var(--text-sm); transition: all .15s ease;
    border-left: 3px solid transparent;
  }
  .v-dense .nav-item { padding: 6px var(--space-3); }
  .nav-item:hover { background: var(--color-surface-2); color: var(--color-text); }
  .nav-item.on { background: var(--color-surface-2); color: var(--color-text); border-left-color: var(--acc, var(--color-primary)); }
  .nav-item .ico { width: 20px; text-align: center; font-size: 14px; }
  .nav-item .dot { margin-left: auto; width: 7px; height: 7px; border-radius: 50%; }
  .nav-item .cnt { margin-left: auto; font-size: var(--text-xs); background: var(--color-surface-3);
    border-radius: var(--radius-full); padding: 1px 7px; color: var(--color-text-muted); }
  .side .foot { margin-top: auto; padding: var(--space-3) var(--space-4) 0; border-top: 1px solid var(--color-border);
    display: flex; align-items: center; gap: 8px; font-size: var(--text-xs); color: var(--color-text-faint); }
  .side .foot .st { width: 8px; height: 8px; border-radius: 50%; background: var(--color-success); box-shadow: 0 0 6px var(--color-success); }

  .main { flex: 1; padding: var(--space-8); overflow-x: hidden; }
  .v-dense .main { padding: var(--space-4); }

  /* ── Page header ─────────────────────────────── */
  .ph { display: flex; align-items: center; gap: var(--space-4); margin-bottom: var(--space-6); }
  .v-dense .ph { margin-bottom: var(--space-3); }
  .ph .ttl { font-size: var(--text-2xl); font-weight: 700; }
  .v-dense .ph .ttl { font-size: var(--text-lg); }
  .ph .sub { color: var(--color-text-muted); font-size: var(--text-sm); margin-top: 3px; }
  .ph .spacer { flex: 1; }

  /* ── Cards / tables ──────────────────────────── */
  .card {
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: var(--radius-lg); padding: var(--space-6); margin-bottom: var(--space-6);
  }
  .v-dense .card { padding: var(--space-3); border-radius: var(--radius-sm); margin-bottom: var(--space-3); }
  .card h3 { font-size: var(--text-base); font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .card .hint { font-size: var(--text-xs); color: var(--color-text-faint); margin-top: 2px; }
  .card-hdr { display: flex; align-items: center; margin-bottom: var(--space-4); }
  .v-dense .card-hdr { margin-bottom: var(--space-2); }
  .card-hdr .spacer { flex: 1; }
  .acc-bar { width: 4px; align-self: stretch; border-radius: 2px; margin-right: 10px; }

  table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
  th { text-align: left; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: .07em;
    color: var(--color-text-faint); padding: 6px 10px; border-bottom: 1px solid var(--color-border); }
  td { padding: 8px 10px; border-bottom: 1px solid var(--color-border); vertical-align: middle; }
  .v-dense td { padding: 5px 8px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.015); }

  /* ── Controls ────────────────────────────────── */
  .btn {
    background: var(--color-primary); border: none; color: #fff; font-weight: 600;
    padding: 9px 16px; border-radius: var(--radius-sm); font-size: var(--text-sm); transition: all .15s ease;
  }
  .btn:hover { background: var(--color-primary-hover); }
  .btn.ghost { background: transparent; border: 1px solid var(--color-border-strong); color: var(--color-text-muted); }
  .btn.ghost:hover { color: var(--color-text); border-color: var(--color-text-faint); }
  .btn.danger { background: transparent; border: 1px solid transparent; color: var(--color-danger); }
  .btn.danger:hover { background: rgba(240,67,90,0.1); }
  .btn.ok { background: var(--color-success); color: #052b21; }
  .btn.sm { padding: 5px 10px; font-size: var(--text-xs); }

  .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; cursor: pointer; }
  .switch input { display: none; }
  .switch .tr { position: absolute; inset: 0; background: var(--color-surface-3); border-radius: var(--radius-full); transition: all .15s ease; }
  .switch .th { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: all .15s ease; }
  .switch input:checked + .tr { background: var(--color-success); }
  .switch input:checked + .tr .th { left: 21px; }
  .switch.lg { width: 50px; height: 28px; }
  .switch.lg .th { width: 20px; height: 20px; top: 4px; left: 4px; }
  .switch.lg input:checked + .tr .th { left: 26px; }

  .field { margin-bottom: var(--space-4); }
  .v-dense .field { margin-bottom: var(--space-2); }
  .field label { display: block; font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted);
    margin-bottom: 5px; letter-spacing: .03em; }
  .field input, .field select {
    width: 100%; background: var(--color-surface-2); border: 1px solid var(--color-border);
    color: var(--color-text); border-radius: var(--radius-sm); padding: 8px 10px; font-size: var(--text-sm);
    font-family: inherit; transition: border-color .15s ease;
  }
  .v-dense .field input, .v-dense .field select { padding: 5px 8px; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--color-primary); }
  .field .mono { font-family: var(--font-mono); font-size: var(--text-xs); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 var(--space-6); }
  .v-dense .grid2 { gap: 0 var(--space-3); }

  .chip { display: inline-flex; align-items: center; gap: 5px; background: var(--color-surface-3);
    border-radius: var(--radius-full); padding: 3px 10px; font-size: var(--text-xs); color: var(--color-text-muted); }
  .chip .h { color: var(--color-text-faint); }
  .badge { font-size: var(--text-xs); padding: 2px 9px; border-radius: var(--radius-full); font-weight: 600; }
  .badge.on  { background: rgba(45,212,167,.14); color: var(--color-success); }
  .badge.off { background: rgba(139,147,163,.14); color: var(--color-text-muted); }
  .badge.pend{ background: rgba(255,176,32,.14); color: var(--color-warning); }

  /* ── Overview stats ──────────────────────────── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); margin-bottom: var(--space-6); }
  .v-dense .stats { gap: var(--space-2); margin-bottom: var(--space-3); }
  .stat { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);
    padding: var(--space-4); border-top: 3px solid var(--acc, var(--color-primary)); }
  .v-dense .stat { padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm); }
  .stat .k { font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .07em; }
  .stat .v { font-size: var(--text-xl); font-weight: 700; margin-top: 4px; }
  .v-dense .stat .v { font-size: var(--text-base); }
  .stat .d { font-size: var(--text-xs); color: var(--color-text-faint); margin-top: 3px; }

  .qa { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4); }
  .qa button { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);
    padding: var(--space-4); text-align: left; color: var(--color-text); transition: all .15s ease; }
  .qa button:hover { border-color: var(--acc); transform: translateY(-1px); }
  .qa .i { font-size: 20px; } .qa .t { font-weight: 600; margin-top: 6px; font-size: var(--text-sm); }
  .qa .s { font-size: var(--text-xs); color: var(--color-text-faint); margin-top: 2px; }

  /* Módulo header (MEE6-style) */
  .mod-hdr { display: flex; align-items: center; gap: var(--space-4); background: var(--color-surface);
    border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-4) var(--space-6);
    margin-bottom: var(--space-6); border-left: 4px solid var(--acc, var(--color-primary)); }
  .mod-hdr .i { font-size: 26px; }
  .mod-hdr .t { font-weight: 700; font-size: var(--text-lg); }
  .mod-hdr .s { font-size: var(--text-sm); color: var(--color-text-muted); margin-top: 2px; }
  .mod-hdr .spacer { flex: 1; }

  /* Galería queue */
  .gq { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4); }
  .v-dense .gq { grid-template-columns: repeat(4, 1fr); gap: var(--space-2); }
  .gcard { background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md);
    overflow: hidden; transition: all .2s ease; }
  .gcard .thumb { height: 110px; display: grid; place-items: center; font-size: 26px; }
  .v-dense .gcard .thumb { height: 70px; }
  .gcard .b { padding: var(--space-3); }
  .gcard .n { font-size: var(--text-sm); font-weight: 600; }
  .gcard .m { font-size: var(--text-xs); color: var(--color-text-faint); margin: 3px 0 8px; }
  .gcard .acts { display: flex; gap: 6px; }

  .empty { text-align: center; color: var(--color-text-faint); padding: var(--space-8); font-size: var(--text-sm); }

  /* ── Modal ───────────────────────────────────── */
  #modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 10000; display: none;
    align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  #modal-bg.open { display: flex; }
  #modal { background: var(--color-surface); border: 1px solid var(--color-border-strong); border-radius: var(--radius-lg);
    width: 460px; max-width: 92vw; padding: var(--space-6); box-shadow: var(--shadow-lg); }
  #modal h3 { margin-bottom: var(--space-4); }

  /* ── Toast ───────────────────────────────────── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--color-surface-3); border: 1px solid var(--color-border-strong); color: var(--color-text);
    padding: 10px 18px; border-radius: var(--radius-md); font-size: var(--text-sm); z-index: 10001;
    transition: transform .25s ease; box-shadow: var(--shadow-md); }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast .ok { color: var(--color-success); margin-right: 6px; }

  /* ── Sketch toolbar ──────────────────────────── */
  #sketch-tools { position: fixed; bottom: 12px; right: 12px; z-index: 9999; font-family: system-ui;
    font-size: 12px; background: rgba(0,0,0,.75); color: #fff; padding: 8px 12px; border-radius: 8px;
    opacity: .35; transition: opacity .2s; display: flex; gap: 8px; align-items: center; }
  #sketch-tools:hover { opacity: 1; }
  #sketch-tools button, #sketch-tools select { background: #222; color: #ddd; border: 1px solid #444;
    border-radius: 4px; font-size: 11px; padding: 3px 7px; }
</style>
</head>
<body>

<div id="variant-nav">
  <span class="tag">SKETCH 001</span>
  <button class="variant-tab active" data-v="a" onclick="showVariant('a', this)">A: MEE6 puro</button>
  <button class="variant-tab" data-v="b" onclick="showVariant('b', this)">B: Consola densa</button>
  <button class="variant-tab" data-v="c" onclick="showVariant('c', this)">C: Overview-first</button>
</div>

<div id="variant-a" class="variant active v-comfy"><div class="shell"><aside class="side" id="side-a"></aside><main class="main" id="main-a"></main></div></div>
<div id="variant-b" class="variant v-dense"><div class="shell"><aside class="side" id="side-b"></aside><main class="main" id="main-b"></main></div></div>
<div id="variant-c" class="variant v-comfy"><div class="shell"><aside class="side" id="side-c"></aside><main class="main" id="main-c"></main></div></div>

<div id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <h3 id="modal-title">Nuevo recordatorio</h3>
    <div class="field"><label>NOMBRE</label><input id="rm-name" placeholder="Reunión semanal de staff"></div>
    <div class="grid2">
      <div class="field"><label>CANAL</label>
        <select id="rm-channel"><option>#staff</option><option>#anuncios</option><option>#general</option></select></div>
      <div class="field"><label>FRECUENCIA</label>
        <select id="rm-freq"><option>Semanal</option><option>Mensual</option><option>Único</option></select></div>
    </div>
    <div class="grid2">
      <div class="field"><label>DÍA</label><select id="rm-day"><option>Domingo</option><option>Lunes</option><option>Día 1 del mes</option><option>30 jul 2026</option></select></div>
      <div class="field"><label>HORA</label><input id="rm-time" value="18:00"></div>
    </div>
    <div class="field"><label>MENSAJE</label><input id="rm-msg" placeholder="¡Reunión de staff en 30 min! @Staff"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn" onclick="saveReminder()">Guardar recordatorio</button>
    </div>
  </div>
</div>

<div id="toast"><span class="ok">✓</span><span id="toast-msg"></span></div>

<div id="sketch-tools">
  <select onchange="document.querySelector('link[href*=themes]').href='../themes/'+this.value+'.css'">
    <option value="default">SaaS oscuro</option>
  </select>
  <button onclick="setVp('375px')">📱</button>
  <button onclick="setVp('768px')">💻</button>
  <button onclick="setVp('100%')">🖥</button>
</div>

<script>
/* ═══ Datos (formas reales del proyecto) ═══════════════════ */
const D = {
  sections: [
    { id:'overview',  ico:'⌂', name:'Overview',       acc:'var(--color-primary)' },
    { id:'gallery',   ico:'🖼', name:'Galería',        acc:'var(--accent-gallery)',  toggle:true, on:true,  pend:3 },
    { id:'reviews',   ico:'★', name:'Reseñas',        acc:'var(--accent-reviews)',  toggle:true, on:true,  pend:1 },
    { id:'reminders', ico:'⏰', name:'Recordatorios',  acc:'var(--accent-reminders)',toggle:true, on:true },
    { id:'jinxxy',    ico:'🛍', name:'Tienda Jinxxy',  acc:'var(--accent-jinxxy)',   toggle:true, on:true },
    { id:'meetings',  ico:'🎙', name:'Reuniones',      acc:'var(--accent-meetings)', toggle:true, on:false },
    { id:'settings',  ico:'⚙', name:'Ajustes',        acc:'var(--accent-settings)' },
  ],
  reminders: [
    { id:1, name:'Reunión semanal de staff',  channel:'#staff',    freq:'Semanal · dom 18:00',   next:'dom 27 jul · 18:00', active:true },
    { id:2, name:'Promo mensual de la tienda',channel:'#anuncios', freq:'Mensual · día 1 12:00', next:'vie 1 ago · 12:00',  active:true },
    { id:3, name:'Revisión de solicitudes',   channel:'#staff',    freq:'Semanal · mié 20:00',   next:'mié 23 jul · 20:00', active:false },
  ],
  galleryPend: [
    { id:1, name:'Kitsune v2',       by:'@Rin',    when:'hace 2 h',  hue:265 },
    { id:2, name:'Neon Dragon',      by:'@Kael',   when:'hace 5 h',  hue:190 },
    { id:3, name:'Moonlight Fox',    by:'@Umbra',  when:'ayer',      hue:330 },
  ],
  reviewsPend: [
    { id:1, by:'@Nyx', avatar:'Kitsune v2', stars:5, text:'Increíble calidad, el rigging es perfecto…', when:'hace 3 h' },
  ],
  products: [
    { name:'Kitsune v2 — Avatar',   price:'$45', synced:'hace 20 min', st:'on' },
    { name:'Neon Dragon — Avatar',  price:'$50', synced:'hace 20 min', st:'on' },
    { name:'Texture Pack Vol. 3',   price:'$12', synced:'hace 20 min', st:'on' },
  ],
  meetings: [
    { title:'Staff semanal — 20 jul', dur:'48 min', st:'Resumen publicado' },
    { title:'Planning tienda — 13 jul', dur:'35 min', st:'Resumen publicado' },
  ],
  settings: [
    { group:'Galería', acc:'var(--accent-gallery)', fields:[
      { label:'Canal de galería', value:'#galería-fotos', raw:'1416329356426481717', type:'channel' },
      { label:'Roles de staff de galería', value:'@Staff Galería', raw:'1418724526308593834', type:'roles' },
    ]},
    { group:'Reseñas', acc:'var(--accent-reviews)', fields:[
      { label:'Canal de reseñas', value:'#reseñas', raw:'1453534905706221600', type:'channel' },
      { label:'Roles de staff de reseñas', value:'@Staff Galería', raw:'1418724526308593834', type:'roles' },
    ]},
    { group:'Recordatorios', acc:'var(--accent-reminders)', fields:[
      { label:'Zona horaria', value:'America/Mexico_City', type:'tz' },
      { label:'Horas de gracia de recuperación', value:'12', type:'int' },
    ]},
    { group:'Tienda Jinxxy', acc:'var(--accent-jinxxy)', fields:[
      { label:'Canal de anuncios', value:'#novedades-tienda', raw:'1525202600738295818', type:'channel' },
      { label:'Intervalo de sondeo (min)', value:'30', type:'int' },
    ]},
    { group:'Reuniones', acc:'var(--accent-meetings)', fields:[
      { label:'Modelo de Whisper', value:'medium', type:'enum' },
      { label:'Foro de resúmenes', value:'#actas-reuniones', raw:'1461022387559012400', type:'channel' },
    ]},
  ],
};
const state = { a:'overview', b:'overview', c:'overview' };
let nextRemId = 10;

/* ═══ Helpers ══════════════════════════════════════════════ */
const $ = (id) => document.getElementById(id);
function toast(msg){ $('toast-msg').textContent = msg; $('toast').classList.add('show');
  clearTimeout(window._tt); window._tt = setTimeout(()=>$('toast').classList.remove('show'), 2200); }
function sec(id){ return D.sections.find(s=>s.id===id); }
function setVp(w){ document.documentElement.style.setProperty('--vp', w); }
function showVariant(v, btn){
  document.querySelectorAll('.variant').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.variant-tab').forEach(t=>t.classList.remove('active'));
  $('variant-'+v).classList.add('active'); btn.classList.add('active');
}
function nav(v, id){ state[v]=id; render(v); }
function sw(checked, onchange, lg){ return `<label class="switch ${lg?'lg':''}"><input type="checkbox" ${checked?'checked':''} onchange="${onchange}"><span class="tr"><span class="th"></span></span></label>`; }

/* ═══ Sidebar ══════════════════════════════════════════════ */
function renderSide(v){
  const cfg = { a:{dots:false,counts:false,grp:true}, b:{dots:true,counts:true,grp:false}, c:{dots:false,counts:true,grp:true} }[v];
  let h = `<div class="brand"><div class="logo">N</div><div><div class="t">Nocturna</div><div class="s">Panel de administración</div></div></div>`;
  D.sections.forEach(s=>{
    if (cfg.grp && s.id==='gallery')  h += `<div class="grp">Módulos</div>`;
    if (cfg.grp && s.id==='settings') h += `<div class="grp">Sistema</div>`;
    const extra = cfg.dots && s.toggle ? `<span class="dot" style="background:${s.on?'var(--color-success)':'var(--color-text-faint)'}"></span>`
                : cfg.counts && s.pend ? `<span class="cnt">${s.pend}</span>` : '';
    h += `<button class="nav-item ${state[v]===s.id?'on':''}" style="--acc:${s.acc}" onclick="nav('${v}','${s.id}')">
            <span class="ico">${s.ico}</span>${s.name}${extra}</button>`;
  });
  h += `<div class="foot"><span class="st"></span> Bot en línea · cinema · v2.4</div>`;
  $('side-'+v).innerHTML = h;
}

/* ═══ Páginas ══════════════════════════════════════════════ */
function pgOverview(v){
  const dense = v==='b';
  let h = `<div class="ph"><div><div class="ttl">Overview</div><div class="sub">Estado del bot y actividad reciente · Nocturna Avatars</div></div>
           <div class="spacer"></div><span class="chip"><span class="h">último despliegue</span> hoy 14:02</span></div>`;
  h += `<div class="stats">
    <div class="stat" style="--acc:var(--color-success)"><div class="k">Bot</div><div class="v">En línea</div><div class="d">desde hace 3 días</div></div>
    <div class="stat" style="--acc:var(--accent-gallery)"><div class="k">Fotos pendientes</div><div class="v">${D.galleryPend.length}</div><div class="d">en cola de aprobación</div></div>
    <div class="stat" style="--acc:var(--accent-reminders)"><div class="k">Próximo recordatorio</div><div class="v">mié 20:00</div><div class="d">Revisión de solicitudes</div></div>
    <div class="stat" style="--acc:var(--accent-jinxxy)"><div class="k">Última sync Jinxxy</div><div class="v" id="sync-v-${v}">hace 20 min</div><div class="d">${D.products.length} productos</div></div>
  </div>`;
  if (v==='c') {
    h += `<div class="card"><div class="card-hdr"><h3>Acciones rápidas</h3></div><div class="qa">
      <button style="--acc:var(--accent-gallery)" onclick="nav('c','gallery')"><div class="i">🖼</div><div class="t">Revisar cola de galería</div><div class="s">${D.galleryPend.length} fotos esperando</div></button>
      <button style="--acc:var(--accent-reminders)" onclick="openModal('c')"><div class="i">⏰</div><div class="t">Nuevo recordatorio</div><div class="s">crear sin salir del overview</div></button>
      <button style="--acc:var(--accent-jinxxy)" onclick="syncNow('c')"><div class="i">🛍</div><div class="t">Sincronizar tienda</div><div class="s">forzar sync de Jinxxy ahora</div></button>
    </div></div>`;
  }
  h += `<div class="card"><div class="card-hdr"><h3>Actividad reciente</h3></div><table>
    <tr><td>🖼</td><td>Foto <b>“Moonlight Fox”</b> publicada al sitio</td><td style="color:var(--color-text-faint)">hace 1 h</td></tr>
    <tr><td>⏰</td><td>Recordatorio <b>“Reunión semanal”</b> enviado a #staff</td><td style="color:var(--color-text-faint)">dom 18:00</td></tr>
    <tr><td>🛍</td><td>Jinxxy sync — sin cambios (3 productos)</td><td style="color:var(--color-text-faint)">hace 20 min</td></tr>
    <tr><td>★</td><td>Reseña de <b>@Nyx</b> aprobada y publicada</td><td style="color:var(--color-text-faint)">ayer</td></tr>
  </table></div>`;
  return h;
}

function modHdr(v, id, desc){
  const s = sec(id);
  return `<div class="mod-hdr" style="--acc:${s.acc}"><span class="i">${s.ico}</span>
    <div><div class="t">${s.name}</div><div class="s">${desc}</div></div><div class="spacer"></div>
    <span class="badge ${s.on?'on':'off'}">${s.on?'Módulo activo':'Desactivado'}</span>
    ${sw(s.on, `toggleMod('${v}','${id}')`, true)}</div>`;
}

function pgReminders(v){
  const dense = v==='b';
  let h = dense
    ? `<div class="ph"><div><div class="ttl">⏰ Recordatorios</div></div><div class="spacer"></div>
       <button class="btn sm" onclick="openModal('${v}')">+ Nuevo</button></div>`
    : modHdr(v,'reminders','Mensajes programados que el bot envía — lo mismo que /reminder en Discord') +
      `<div class="ph"><div><div class="sub">${D.reminders.length} recordatorios configurados · zona horaria America/Mexico_City</div></div>
       <div class="spacer"></div><button class="btn" onclick="openModal('${v}')">+ Nuevo recordatorio</button></div>`;
  if (!D.reminders.length) return h + `<div class="card"><div class="empty">No hay recordatorios. Crea el primero con “+ Nuevo”.</div></div>`;
  h += `<div class="card" style="padding:${dense?'0':'var(--space-2) var(--space-4)'}"><table>
    <tr><th>Recordatorio</th><th>Canal</th><th>Frecuencia</th><th>Próximo envío</th><th>Activo</th><th></th></tr>`;
  D.reminders.forEach(r=>{
    h += `<tr><td><b>${r.name}</b></td><td><span class="chip">${r.channel}</span></td>
      <td style="color:var(--color-text-muted)">${r.freq}</td><td style="color:var(--color-text-muted)">${r.next}</td>
      <td>${sw(r.active, `toggleRem('${v}',${r.id})`)}</td>
      <td style="text-align:right"><button class="btn ghost sm" onclick="openModal('${v}',${r.id})">Editar</button>
      <button class="btn danger sm" onclick="delRem('${v}',${r.id})">Borrar</button></td></tr>`;
  });
  return h + `</table></div>`;
}

function pgGallery(v){
  const dense = v==='b';
  let h = dense
    ? `<div class="ph"><div><div class="ttl">🖼 Galería — cola de aprobación</div></div><div class="spacer"></div><span class="badge pend">${D.galleryPend.length} pendientes</span></div>`
    : modHdr(v,'gallery','Cola de fotos del foro — aprobar aquí equivale a la reacción ✅ del staff en Discord') +
      `<div class="ph"><div><div class="sub">Pendientes de aprobación (${D.galleryPend.length})</div></div></div>`;
  if (!D.galleryPend.length) h += `<div class="card"><div class="empty">🎉 Cola vacía — no hay fotos esperando aprobación.</div></div>`;
  else {
    h += `<div class="gq">`;
    D.galleryPend.forEach(g=>{
      h += `<div class="gcard" id="g-${v}-${g.id}"><div class="thumb" style="background:linear-gradient(135deg,hsl(${g.hue},45%,22%),hsl(${g.hue+40},45%,14%))">🖼</div>
        <div class="b"><div class="n">${g.name}</div><div class="m">${g.by} · ${g.when}</div>
        <div class="acts"><button class="btn ok sm" onclick="approveG('${v}',${g.id})">✓ Aprobar</button>
        <button class="btn danger sm" onclick="rejectG('${v}',${g.id})">✕ Quitar</button></div></div></div>`;
    });
    h += `</div>`;
  }
  h += `<div class="card" style="margin-top:var(--space-6)"><div class="card-hdr"><h3>Publicadas recientemente</h3></div><table>
    <tr><td>Moonlight Fox</td><td>@Umbra</td><td><span class="badge on">publicada</span></td><td style="color:var(--color-text-faint)">hace 1 h</td></tr>
    <tr><td>Cyber Wolf</td><td>@Kael</td><td><span class="badge on">publicada</span></td><td style="color:var(--color-text-faint)">ayer</td></tr>
  </table></div>`;
  return h;
}

function pgReviews(v){
  let h = v==='b'
    ? `<div class="ph"><div><div class="ttl">★ Reseñas</div></div><div class="spacer"></div><span class="badge pend">${D.reviewsPend.length} pendiente</span></div>`
    : modHdr(v,'reviews','Reseñas de la comunidad — aprobar publica a reviews.json del sitio');
  D.reviewsPend.forEach(r=>{
    h += `<div class="card" id="rv-${v}-${r.id}"><div class="card-hdr"><div class="acc-bar" style="background:var(--accent-reviews)"></div>
      <div><h3>${r.by} — ${r.avatar} <span style="color:var(--accent-reviews)">${'★'.repeat(r.stars)}</span></h3>
      <div class="hint">${r.when}</div></div><div class="spacer"></div>
      <button class="btn ok sm" onclick="approveRv('${v}',${r.id})">✓ Aprobar</button>&nbsp;
      <button class="btn danger sm" onclick="approveRv('${v}',${r.id},true)">✕ Rechazar</button></div>
      <p style="color:var(--color-text-muted);font-size:var(--text-sm)">“${r.text}”</p></div>`;
  });
  if (!D.reviewsPend.length) h += `<div class="card"><div class="empty">Sin reseñas pendientes.</div></div>`;
  return h;
}

function pgJinxxy(v){
  let h = v==='b'
    ? `<div class="ph"><div><div class="ttl">🛍 Tienda Jinxxy</div></div><div class="spacer"></div><button class="btn sm" id="sync-btn-${v}" onclick="syncNow('${v}')">⟳ Sincronizar ahora</button></div>`
    : modHdr(v,'jinxxy','Sondeo periódico de la tienda — refleja productos en store.json del sitio') +
      `<div class="ph"><div><div class="sub">Última sincronización: <b id="sync-lbl-${v}">hace 20 min</b> · próxima en 10 min</div></div>
       <div class="spacer"></div><button class="btn" id="sync-btn-${v}" onclick="syncNow('${v}')">⟳ Sincronizar ahora</button></div>`;
  h += `<div class="card" style="padding:0"><table><tr><th>Producto</th><th>Precio</th><th>Sincronizado</th><th>Estado</th></tr>`;
  D.products.forEach(p=>{ h += `<tr><td><b>${p.name}</b></td><td>${p.price}</td><td style="color:var(--color-text-muted)">${p.synced}</td><td><span class="badge on">en el sitio</span></td></tr>`; });
  return h + `</table></div>`;
}

function pgMeetings(v){
  let h = v==='b'
    ? `<div class="ph"><div><div class="ttl">🎙 Reuniones</div></div></div>`
    : modHdr(v,'meetings','Captura de voz → transcripción Whisper → resumen al foro');
  h += `<div class="card" style="padding:0"><table><tr><th>Reunión</th><th>Duración</th><th>Estado</th></tr>`;
  D.meetings.forEach(m=>{ h += `<tr><td><b>${m.title}</b></td><td>${m.dur}</td><td><span class="badge on">${m.st}</span></td></tr>`; });
  return h + `</table></div>`;
}

function pgSettings(v){
  const dense = v==='b';
  let h = `<div class="ph"><div><div class="ttl">⚙ Ajustes</div><div class="sub">Valores operativos seguros — los secretos nunca aparecen aquí</div></div>
    <div class="spacer"></div><button class="btn" onclick="saveSettings('${v}', this)">Guardar cambios</button></div>`;
  D.settings.forEach(g=>{
    h += `<div class="card"><div class="card-hdr"><div class="acc-bar" style="background:${g.acc}"></div><h3>${g.group}</h3></div><div class="grid2">`;
    g.fields.forEach(f=>{
      const resolved = f.raw ? `<div class="hint" style="margin-top:4px">ID: <span style="font-family:var(--font-mono)">${f.raw}</span></div>` : '';
      if (f.type==='channel' || f.type==='roles')
        h += `<div class="field"><label>${f.label.toUpperCase()}</label><select><option>${f.value}</option><option>#staff</option><option>#general</option></select>${resolved}</div>`;
      else if (f.type==='tz')
        h += `<div class="field"><label>${f.label.toUpperCase()}</label><select><option>${f.value}</option><option>UTC</option><option>Europe/Madrid</option></select></div>`;
      else
        h += `<div class="field"><label>${f.label.toUpperCase()}</label><input value="${f.value}"></div>`;
    });
    h += `</div></div>`;
  });
  return h;
}

/* ═══ Render + acciones ════════════════════════════════════ */
const pages = { overview:pgOverview, reminders:pgReminders, gallery:pgGallery, reviews:pgReviews, jinxxy:pgJinxxy, meetings:pgMeetings, settings:pgSettings };
function render(v){ renderSide(v); $('main-'+v).innerHTML = pages[state[v]](v); }

function toggleMod(v,id){ const s=sec(id); s.on=!s.on; render(v); toast(s.on?`Módulo ${s.name} activado`:`Módulo ${s.name} desactivado`); }
function toggleRem(v,id){ const r=D.reminders.find(x=>x.id===id); r.active=!r.active; toast(r.active?'Recordatorio activado':'Recordatorio pausado'); render(v); }
function delRem(v,id){ D.reminders = D.reminders.filter(x=>x.id!==id); render(v); toast('Recordatorio borrado'); }
let modalCtx = null;
function openModal(v,id){ modalCtx={v,id}; $('modal-title').textContent = id?'Editar recordatorio':'Nuevo recordatorio';
  if(id){ const r=D.reminders.find(x=>x.id===id); $('rm-name').value=r.name; } else { $('rm-name').value=''; }
  $('modal-bg').classList.add('open'); }
function closeModal(){ $('modal-bg').classList.remove('open'); }
function saveReminder(){
  const name = $('rm-name').value.trim() || 'Recordatorio sin nombre';
  const {v,id} = modalCtx;
  if (id) { D.reminders.find(x=>x.id===id).name = name; toast('Recordatorio actualizado'); }
  else { D.reminders.push({ id:nextRemId++, name, channel:$('rm-channel').value, freq:$('rm-freq').value+' · '+$('rm-time').value, next:'próximo ciclo', active:true }); toast('Recordatorio creado'); }
  closeModal(); if (state[v]==='reminders'||state[v]==='overview') render(v);
}
function approveG(v,id){ const el=$('g-'+v+'-'+id); el.style.opacity=0; el.style.transform='scale(.95)';
  setTimeout(()=>{ D.galleryPend=D.galleryPend.filter(x=>x.id!==id); sec('gallery').pend=D.galleryPend.length; render(v); }, 200);
  toast('Foto aprobada — publicando al sitio…'); }
function rejectG(v,id){ const el=$('g-'+v+'-'+id); el.style.opacity=0;
  setTimeout(()=>{ D.galleryPend=D.galleryPend.filter(x=>x.id!==id); sec('gallery').pend=D.galleryPend.length; render(v); }, 200);
  toast('Foto quitada de la cola'); }
function approveRv(v,id,rej){ D.reviewsPend=D.reviewsPend.filter(x=>x.id!==id); sec('reviews').pend=0; render(v);
  toast(rej?'Reseña rechazada':'Reseña aprobada — publicando…'); }
function syncNow(v){ const b=$('sync-btn-'+v); if(b){ b.textContent='⟳ Sincronizando…'; b.disabled=true; }
  setTimeout(()=>{ D.products.forEach(p=>p.synced='ahora mismo'); toast('Tienda sincronizada — 3 productos, sin cambios'); render(v); }, 900); }
function saveSettings(v,btn){ btn.textContent='Guardando…'; btn.disabled=true;
  setTimeout(()=>{ btn.textContent='Guardar cambios'; btn.disabled=false; toast('Ajustes guardados — el bot los usa en su próximo ciclo'); }, 700); }

['a','b','c'].forEach(render);
</script>
</body>
</html>
